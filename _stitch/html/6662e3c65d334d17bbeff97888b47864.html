<!DOCTYPE html>
<html lang="zh-CN"><head>

<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {

              primary: "#E63946", // Festive Red
              secondary: "#FFB703", // Gold/Yellow
              "background-light": "#FFFBE6", // Light Cream
              "background-dark": "#2D1B1E", // Dark warm brown/red
              "wechat-green": "#07C160",
              "text-main-light": "#4A2C2C",
            },
            fontFamily: {
              display: ["Zcool KuaiLe", "Fredoka", "Noto Sans SC", "sans-serif"],
              sans: ["Noto Sans SC", "sans-serif"],
            },
            backgroundImage: {
              'confetti': "url('data:image/svg+xml,%3Csvg width=\\'60\\' height=\\'60\\' viewBox=\\'0 0 60 60\\' xmlns=\\'http://www.w3.org/2000/svg\\'%3E%3Cg fill=\\'none\\' fill-rule=\\'evenodd\\'%3E%3Cg fill=\\'%23FFB703\\' fill-opacity=\\'0.2\\'%3E%3Cpath d=\\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E')",
            }

<style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .font-playful {
            font-family: 'Zcool KuaiLe', cursive;
        }.custom-checkbox:checked {
            background-color: #E63946;
            border-color: #E63946;
        }
        .custom-checkbox:focus {
            ring-color: #E63946;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen relative overflow-hidden flex flex-col justify-between">
<div class="absolute inset-0 bg-confetti z-0 pointer-events-none"></div>
<div class="fixed top-0 left-0 w-64 h-64 bg-primary/10 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
<div class="fixed bottom-0 right-0 w-80 h-80 bg-secondary/10 rounded-full blur-3xl translate-x-1/3 translate-y-1/3 pointer-events-none"></div>
<div class="absolute top-10 left-6 text-primary/20 rotate-12 pointer-events-none animate-pulse">
<span class="material-icons-round text-4xl">emoji_events</span>
</div>
<div class="absolute top-20 right-8 text-secondary/40 -rotate-12 pointer-events-none">
<span class="material-icons-round text-5xl">monetization_on</span>
</div>
<div class="absolute bottom-32 left-8 text-primary/10 rotate-45 pointer-events-none">
<span class="material-icons-round text-6xl">casino</span>
</div>
<main class="relative z-10 flex-1 flex flex-col items-center justify-center w-full max-w-md mx-auto px-6 pt-12 pb-6">
<div class="w-full flex flex-col items-center justify-center mb-8">
<div class="relative w-48 h-48 mb-4">
<div class="absolute inset-0 bg-secondary/20 rounded-full blur-xl scale-90"></div>
<div class="relative w-full h-full flex items-center justify-center">
<div class="bg-white p-4 rounded-3xl shadow-lg border-4 border-secondary transform -rotate-6 z-10">
<span class="material-icons-round text-6xl text-primary">sports_esports</span>
</div>
<div class="bg-primary p-4 rounded-3xl shadow-lg border-4 border-white transform rotate-12 -ml-8 mt-8 z-20">
<span class="material-icons-round text-6xl text-white">sentiment_very_satisfied</span>
</div>
<div class="bg-secondary p-3 rounded-2xl shadow-lg border-4 border-white absolute -top-2 right-4 rotate-12 z-0">
<span class="material-icons-round text-4xl text-white">star</span>
</div>
</div>
</div>
<h1 class="text-4xl md:text-5xl font-playful text-primary tracking-wider text-center drop-shadow-sm mb-2">
            欢乐记分馆
        </h1>
<p class="text-text-main-light/60 text-sm font-medium tracking-wide">
            好友聚会 · 轻松记分 · 快乐加倍
        </p>
</div>
<div class="w-full space-y-4 mt-8">
<button class="w-full h-14 bg-wechat-green hover:bg-green-600 text-white rounded-full flex items-center justify-center space-x-3 shadow-lg shadow-green-200 dark:shadow-none transition-transform active:scale-95 group">
<svg class="w-6 h-6 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.472 14.73c.189 0 .375.032.553.093-.075-.246-.115-.505-.115-.77 0-1.428 1.34-2.586 2.992-2.586 1.652 0 2.991 1.158 2.991 2.586 0 1.427-1.34 2.585-2.99 2.585-.357 0-.701-.06-1.018-.17l-.845.473.235-.745c-.486-.407-.798-.952-.803-1.558v.092zm-5.466 3.67c5.152 0 9.328-3.41 9.328-7.618 0-4.208-4.176-7.619-9.328-7.619C6.853 3.163 2.678 6.574 2.678 10.782c0 2.308 1.258 4.373 3.228 5.76l-.723 2.193 2.535-1.28c1.296.61 2.756.945 4.288.945z" fill="#ffffff" fill-rule="nonzero"></path>
</svg>
<span class="text-lg font-bold tracking-wide">微信一键登录</span>
</button>
</div>
</main>
<footer class="relative z-10 w-full px-6 py-6 pb-safe-bottom">
<div class="flex items-start justify-center space-x-2 max-w-xs mx-auto">
<div class="flex items-center h-5">
<input class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary custom-checkbox cursor-pointer transition-colors" id="agreement" type="checkbox"/>
</div>
<label class="text-[11px] leading-4 text-gray-500 text-center select-none" for="agreement">
            我已阅读并同意 
            <a class="text-primary font-bold hover:underline" href="#">《用户协议》</a> 
            和 
            <a class="text-primary font-bold hover:underline" href="#">《隐私政策》</a>
<br/>
<span class="text-gray-400 block mt-0.5">未注册手机号登录后将自动创建账号</span>
</label>
</div>
</footer>
<script>
    // Simple interactions for checkbox visual feedback
    const checkbox = document.getElementById('agreement');
    checkbox.addEventListener('change', function() {
        if(this.checked) {
            this.classList.add('ring-2', 'ring-offset-1', 'ring-primary/50');
        } else {
            this.classList.remove('ring-2', 'ring-offset-1', 'ring-primary/50');
        }
    });
</script>
</body></html>
