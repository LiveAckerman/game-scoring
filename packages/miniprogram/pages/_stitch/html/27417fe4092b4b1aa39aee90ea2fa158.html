<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>编辑资料页面</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#D93025", // Festive Red
                        secondary: "#FFD700", // Gold
                        "background-light": "#FFF5F5", // Very light pinkish white for warmth
                        "background-dark": "#2D0A0A", // Dark reddish brown for dark mode
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#3D1414", // Slightly lighter dark red
                        "text-light": "#4A0404", // Dark red text
                        "text-dark": "#FFE5E5", // Light pink text
                        "accent-gold": "#F2C94C",
                    },
                    fontFamily: {
                        display: ["'M PLUS Rounded 1c'", "sans-serif"],
                        body: ["'Nunito'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        'xl': "1.5rem",
                        '2xl': "2rem",
                    },
                    boxShadow: {
                        'festive': '0 4px 14px 0 rgba(217, 48, 37, 0.15)',
                        'gold': '0 4px 14px 0 rgba(242, 201, 76, 0.25)',
                    }
                },
            },
        };
    </script>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&amp;family=Nunito:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<style>
        body {
            font-family: 'Nunito', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: max(884px, 100dvh);
        }
        h1, h2, h3, .font-display {
            font-family: 'M PLUS Rounded 1c', 'PingFang SC', sans-serif;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-text-light dark:text-text-dark min-h-screen flex flex-col antialiased transition-colors duration-300">
<header class="sticky top-0 z-50 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md px-4 py-3 flex justify-between items-center">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-black/5 active:bg-black/10 transition-colors">
<span class="material-icons-round text-2xl text-primary dark:text-secondary">arrow_back</span>
</button>
<h1 class="text-lg font-bold font-display">编辑资料</h1>
<div class="w-10"></div>
</header>
<main class="flex-1 px-4 pb-24 overflow-y-auto no-scrollbar">
<div class="mt-6 flex flex-col items-center justify-center relative">
<div class="relative group cursor-pointer">
<div class="w-28 h-28 rounded-full p-1 bg-gradient-to-br from-primary to-orange-600 shadow-festive">
<img alt="User Avatar" class="w-full h-full rounded-full border-4 border-white object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC7HZEUyEO7GF4NKRk9GWU2JXJ4Uc5S3NYMRcZ4_ioYH4Rq5PcGxqXRfl8JhMv5LiprbnUSAYEmPmv0jxSRe4wf2Jo9DA_pfatRNebgDne_IyMOAoDdSzhFqkaxmEPBx3kmz94ahLSFFpgrE4MVs0L9zpH2Y7kK9bIoLJvut0fLFQeYJ2QxbfkKpP6MvWLdhTpagwq71jVXhkCNaQgF3G_w0esQ0qKJZtElHOweg_UF10gGjBUx2AmJhnKPDpiT_4U0YRaN5-w2Tjg"/>
</div>
<div class="absolute bottom-0 right-0 bg-secondary text-primary p-2 rounded-full border-4 border-white shadow-gold hover:scale-105 transition-transform">
<span class="material-icons-round text-xl block">photo_camera</span>
</div>
</div>
<p class="mt-3 text-sm text-gray-500 font-medium">点击更换头像</p>
</div>
<div class="mt-8 space-y-6">
<div class="space-y-2">
<label class="block text-sm font-bold text-text-light dark:text-text-dark ml-1">昵称</label>
<div class="relative">
<input class="w-full bg-surface-light dark:bg-surface-dark border-2 border-transparent focus:border-primary/30 focus:ring-0 rounded-2xl py-4 px-4 text-base font-semibold shadow-sm text-text-light dark:text-white placeholder-gray-400 outline-none transition-all" type="text" value="Lucky Dragon"/>
<span class="material-icons-round absolute right-4 top-1/2 -translate-y-1/2 text-gray-400">edit</span>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-bold text-text-light dark:text-text-dark ml-1">性别</label>
<div class="flex gap-4">
<label class="flex-1 cursor-pointer">
<input checked="" class="peer sr-only" name="gender" type="radio"/>
<div class="bg-surface-light dark:bg-surface-dark peer-checked:bg-blue-50 peer-checked:border-blue-500 border-2 border-transparent rounded-2xl p-3 flex flex-col items-center justify-center gap-1 shadow-sm transition-all h-24">
<span class="material-icons-round text-3xl text-blue-500">male</span>
<span class="text-sm font-bold text-blue-700 dark:text-blue-300">男</span>
</div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="gender" type="radio"/>
<div class="bg-surface-light dark:bg-surface-dark peer-checked:bg-pink-50 peer-checked:border-pink-500 border-2 border-transparent rounded-2xl p-3 flex flex-col items-center justify-center gap-1 shadow-sm transition-all h-24">
<span class="material-icons-round text-3xl text-pink-500">female</span>
<span class="text-sm font-bold text-pink-700 dark:text-pink-300">女</span>
</div>
</label>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-end px-1">
<label class="block text-sm font-bold text-text-light dark:text-text-dark">称号</label>
<button class="text-xs text-primary font-bold">查看全部</button>
</div>
<div class="bg-surface-light dark:bg-surface-dark rounded-2xl p-4 shadow-sm">
<div class="grid grid-cols-2 gap-3">
<div class="relative group cursor-pointer border-2 border-secondary bg-yellow-50/50 dark:bg-yellow-900/10 rounded-xl p-3 flex items-center gap-3 transition-all">
<div class="w-10 h-10 rounded-full bg-secondary flex items-center justify-center shadow-gold shrink-0">
<span class="material-icons-round text-primary">emoji_events</span>
</div>
<div class="flex flex-col">
<span class="text-sm font-bold text-primary">小财神</span>
<span class="text-[10px] text-yellow-700">当前佩戴</span>
</div>
<div class="absolute top-2 right-2 text-primary">
<span class="material-icons-round text-base">check_circle</span>
</div>
</div>
<div class="relative group cursor-pointer border-2 border-transparent hover:bg-gray-50 dark:hover:bg-white/5 rounded-xl p-3 flex items-center gap-3 transition-all opacity-60 grayscale hover:grayscale-0 hover:opacity-100">
<div class="w-10 h-10 rounded-full bg-red-100 dark:bg-red-900 flex items-center justify-center shrink-0">
<span class="material-icons-round text-red-500">local_fire_department</span>
</div>
<div class="flex flex-col">
<span class="text-sm font-bold text-gray-600 dark:text-gray-300">常胜将军</span>
<span class="text-[10px] text-gray-400">需胜率60%</span>
</div>
</div>
<div class="relative group cursor-pointer border-2 border-transparent hover:bg-gray-50 dark:hover:bg-white/5 rounded-xl p-3 flex items-center gap-3 transition-all opacity-60 grayscale hover:grayscale-0 hover:opacity-100">
<div class="w-10 h-10 rounded-full bg-purple-100 dark:bg-purple-900 flex items-center justify-center shrink-0">
<span class="material-icons-round text-purple-500">star</span>
</div>
<div class="flex flex-col">
<span class="text-sm font-bold text-gray-600 dark:text-gray-300">运气王</span>
<span class="text-[10px] text-gray-400">暂未解锁</span>
</div>
</div>
<div class="relative group cursor-pointer border-2 border-transparent hover:bg-gray-50 dark:hover:bg-white/5 rounded-xl p-3 flex items-center gap-3 transition-all opacity-60 grayscale hover:grayscale-0 hover:opacity-100">
<div class="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900 flex items-center justify-center shrink-0">
<span class="material-icons-round text-blue-500">diamond</span>
</div>
<div class="flex flex-col">
<span class="text-sm font-bold text-gray-600 dark:text-gray-300">至尊VIP</span>
<span class="text-[10px] text-gray-400">会员专属</span>
</div>
</div>
</div>
</div>
</div>
</div>
<div class="mt-12 mb-8">
<button class="w-full bg-gradient-to-r from-primary to-red-600 hover:from-red-600 hover:to-red-700 active:scale-95 transition-all text-white font-bold text-lg py-4 rounded-2xl shadow-festive flex items-center justify-center gap-2">
<span class="material-icons-round">save</span>
                保存修改
            </button>
</div>
</main>
<nav class="fixed bottom-0 w-full bg-white dark:bg-[#200505] border-t border-gray-100 dark:border-white/5 pb-6 pt-3 px-6 flex justify-between items-center z-50 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
<a class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-icons-round text-2xl">home</span>
<span class="text-[10px] font-medium">首页</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400 dark:text-gray-500 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-icons-round text-2xl">bar_chart</span>
<span class="text-[10px] font-medium">记录</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary dark:text-primary transition-colors" href="#">
<span class="material-icons-round text-2xl">person</span>
<span class="text-[10px] font-medium">我的</span>
</a>
</nav>

</body></html>
